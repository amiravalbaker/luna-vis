{% extends "moon/base.html" %}
{% load static %}

{% block title %}Reset Password - LunaVis{% endblock %}

{% block content %}
<section class="card">
    <h2>Reset Password</h2>

    <form id="reset-password-form" class="form-grid">
        <label>
            New password
            <input type="password" id="new-password" required>
        </label>

        <label>
            Confirm new password
            <input type="password" id="new-password-confirm" required>
        </label>

        <button type="submit">Set new password</button>
    </form>

    <div id="reset-password-status"></div>
</section>

<script src="{% static 'moon/js/reset_password.js' %}"></script>
{% endblock %}
