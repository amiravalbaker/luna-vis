{% extends "moon/base.html" %}
{% load static %}

{% block title %}Login - LunaVis{% endblock %}

{% block content %}
<section class="card">
    <h2>Login</h2>

    <form id="login-form" class="form-grid">
        <label>
            Username
            <input type="text" id="username" required>
        </label>

        <label>
            Password
            <input type="password" id="password" required>
        </label>

        <button type="submit">Login</button>
    </form>

    <div id="login-status"></div>

    <hr>

    <section class="form-grid" aria-label="Resend verification email">
        <h3>Didn't verify your email?</h3>
        <label>
            Email
            <input type="email" id="verification-email" placeholder="you@example.com">
        </label>
        <button type="button" id="resend-verification-btn">Resend verification email</button>
        <div id="verification-status"></div>
    </section>
</section>

<script src="{% static 'moon/js/login.js' %}"></script>
{% endblock %}
